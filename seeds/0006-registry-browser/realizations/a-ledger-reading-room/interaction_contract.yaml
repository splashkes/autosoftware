contract_version: v1
surface_kind: read_only
seed_id: 0006-registry-browser
realization_id: a-ledger-reading-room
summary: Human-first reading room over the registry that groups accepted catalog state by system, governed thing, action, read model, and contract while keeping each view traceable to the authoritative API.
links:
  seed_design: ../../design.md
  seed_brief: ../../brief.md
  seed_acceptance: ../../acceptance.md
  realization_readme: README.md
auth_modes:
  - anonymous
capabilities:
  - name: search_documents
    summary: Searchable reading-room views over systems, objects, actions, read models, contracts, and registry internals.
  - name: search_facets
    summary: Facet filters that narrow registry material without forcing users to know internal implementation vocabulary first.
domain_objects:
  - kind: registry_system
    summary: Human-readable grouping of accepted registry resources that share one seed identity.
    schema_ref: ../../design.md
    capabilities:
      - search_documents
      - search_facets
  - kind: registry_object
    summary: Stable object identity exposed through the registry and explained in human-first browse flows.
    schema_ref: ../../design.md
    capabilities:
      - search_documents
      - search_facets
  - kind: registry_command
    summary: Command contract exposed as an action in human-facing reading-room copy.
    schema_ref: ../../design.md
    capabilities:
      - search_documents
      - search_facets
  - kind: registry_projection
    summary: Projection contract exposed as a read model in human-facing reading-room copy.
    schema_ref: ../../design.md
    capabilities:
      - search_documents
      - search_facets
  - kind: registry_realization
    summary: Realization contract exposed as part of the system and contract browse story.
    schema_ref: ../../design.md
    capabilities:
      - search_documents
  - kind: registry_schema
    summary: Schema reference exposed as part of the contract and governing-meaning story.
    schema_ref: ../../design.md
    capabilities:
      - search_documents
projections:
  - name: registry_reading_room.home
    summary: Human-first landing page that introduces the registry as a ledger of software systems and their accepted contracts.
    path: /v1/projections/0006-registry-browser/reading-room/home
    object_kinds:
      - registry_system
      - registry_realization
      - registry_object
      - registry_command
      - registry_projection
      - registry_schema
    capabilities:
      - search_documents
    freshness: materialized
  - name: registry_reading_room.systems
    summary: Systems index grouped by seed identity with purpose, maturity, governed objects, actions, and read models.
    path: /v1/projections/0006-registry-browser/reading-room/systems
    object_kinds:
      - registry_system
      - registry_realization
      - registry_object
      - registry_command
      - registry_projection
      - registry_schema
    capabilities:
      - search_documents
      - search_facets
    freshness: materialized
  - name: registry_reading_room.system_detail
    summary: One system view that explains what the software governs, how mature it is, and which authoritative routes back it.
    path: /v1/projections/0006-registry-browser/reading-room/systems/{seed_id}
    object_kinds:
      - registry_system
      - registry_realization
      - registry_object
      - registry_command
      - registry_projection
      - registry_schema
    capabilities:
      - search_documents
    freshness: materialized
  - name: registry_reading_room.objects
    summary: Governed-things index that emphasizes what exists, what can happen to it, and where it is seen.
    path: /v1/projections/0006-registry-browser/reading-room/objects
    object_kinds:
      - registry_object
      - registry_command
      - registry_projection
      - registry_realization
      - registry_schema
    capabilities:
      - search_documents
      - search_facets
    freshness: materialized
  - name: registry_reading_room.object_detail
    summary: Object detail that answers what the thing is, what governs it, which actions affect it, and which read models expose it.
    path: /v1/projections/0006-registry-browser/reading-room/objects/{seed_id}/{kind}
    object_kinds:
      - registry_object
      - registry_command
      - registry_projection
      - registry_realization
      - registry_schema
    capabilities:
      - search_documents
    freshness: materialized
  - name: registry_reading_room.actions
    summary: Commands index relabeled as actions with summaries, audience, and resulting read-model links shown before raw route details.
    path: /v1/projections/0006-registry-browser/reading-room/actions
    object_kinds:
      - registry_command
      - registry_realization
      - registry_object
      - registry_projection
      - registry_schema
    capabilities:
      - search_documents
      - search_facets
    freshness: materialized
  - name: registry_reading_room.action_detail
    summary: Action detail that emphasizes intent, authority, affected object kinds, resulting read models, and canonical plus permalink URLs before raw wire details.
    path: /v1/projections/0006-registry-browser/reading-room/actions/{reference}/{name}
    object_kinds:
      - registry_command
      - registry_realization
      - registry_object
      - registry_projection
      - registry_schema
    capabilities:
      - search_documents
    freshness: materialized
  - name: registry_reading_room.read_models
    summary: Projections index relabeled as read models with the question each model answers made explicit.
    path: /v1/projections/0006-registry-browser/reading-room/read-models
    object_kinds:
      - registry_projection
      - registry_realization
      - registry_object
      - registry_command
    capabilities:
      - search_documents
      - search_facets
    freshness: materialized
  - name: registry_reading_room.read_model_detail
    summary: Read-model detail that explains freshness, source system, governed things, authoritative projection route, and canonical plus permalink URLs.
    path: /v1/projections/0006-registry-browser/reading-room/read-models/{reference}/{name}
    object_kinds:
      - registry_projection
      - registry_realization
      - registry_object
      - registry_command
    capabilities:
      - search_documents
    freshness: materialized
  - name: registry_reading_room.contracts
    summary: Contract index that joins realizations and schemas into one clearer browse surface for governing meaning and behavior.
    path: /v1/projections/0006-registry-browser/reading-room/contracts
    object_kinds:
      - registry_realization
      - registry_schema
      - registry_command
      - registry_projection
      - registry_object
    capabilities:
      - search_documents
      - search_facets
    freshness: materialized
  - name: registry_reading_room.contract_detail
    summary: Contract detail that connects one realization to its objects, actions, read models, schemas, lifecycle state, and canonical plus permalink URLs.
    path: /v1/projections/0006-registry-browser/reading-room/contracts/{reference}
    object_kinds:
      - registry_realization
      - registry_schema
      - registry_command
      - registry_projection
      - registry_object
    capabilities:
      - search_documents
    freshness: materialized
  - name: registry_reading_room.registry_internals
    summary: Clearly separated browse surface for registry-internal meta resources and self-describing catalog machinery.
    path: /v1/projections/0006-registry-browser/reading-room/registry-internals
    object_kinds:
      - registry_realization
      - registry_command
      - registry_projection
      - registry_object
      - registry_schema
    capabilities:
      - search_documents
      - search_facets
    freshness: materialized
consistency:
  write_visibility: eventual
  projection_freshness: materialized
