approach_id: api-first-taxonomy

description: >
  API-first ingestion with structured domains and graph-like taxonomy.
  Public UI for browsing; no admin UI initially.

principles:
  - ingestion via agents
  - append-only data model - but with plan for redaction/scrubbing if legal requirement
  - taxonomy-driven discovery
  - organization-scoped computation

components:
  - ingestion API
  - taxonomy system
  - entry registry
  - media storage
  - award computation engine
  - public viewer UI

risks:
  - taxonomy inconsistency
  - ingestion errors from unstructured data
  - award rule complexity

future_extensions:
  - real-time ingestion tools
  - admin UI
  - cross-org federation layer
