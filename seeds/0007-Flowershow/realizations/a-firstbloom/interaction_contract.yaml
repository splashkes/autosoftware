projections:
  - name: organizations.directory
    summary: List of all organizations/clubs known to the flower-show realization.
    path: /v1/projections/0007-Flowershow/organizations
    object_kinds:
      - organization
    auth_modes:
      - anonymous
      - session
      - service_token
    capabilities:
      - activity_events
    freshness: materialized
    data_views:
      - auth_modes:
          - anonymous
          - session
          - service_token
        sections:
          - shared_metadata
        summary: Agents can discover existing organizations before authoring or updating shows.
  - name: clubs.workspace
    summary: Private club workspace for invitation, membership context, and linked-show administration.
    path: /v1/projections/0007-Flowershow/clubs/{id}/workspace
    object_kinds:
      - organization
      - person
      - show
    auth_modes:
      - session
      - service_token
    capabilities:
      - activity_events
      - sessions
    freshness: direct
    data_views:
      - auth_modes:
          - session
          - service_token
        sections:
          - shared_metadata
          - private_payload
          - runtime_only
        summary: Authenticated club admins and agents can inspect invite state, linked shows, and current club membership context.
  - name: shows.directory
    summary: List of all shows with summary info.
    path: /v1/projections/0007-Flowershow/shows
    object_kinds:
      - show
    auth_modes:
      - anonymous
      - session
      - service_token
    capabilities:
      - state_transitions
      - activity_events
    freshness: materialized
    data_views:
      - auth_modes:
          - anonymous
          - session
          - service_token
        sections:
          - shared_metadata
          - public_payload
        summary: All callers get the shared and public show slice for the directory.
  - name: shows.detail
    summary: Canonical show detail projection with public schedule and entry data.
    path: /v1/projections/0007-Flowershow/shows/{id}
    object_kinds:
      - show
    auth_modes:
      - anonymous
      - session
      - service_token
    capabilities:
      - state_transitions
      - activity_events
    freshness: materialized
    data_views:
      - auth_modes:
          - anonymous
        sections:
          - shared_metadata
          - public_payload
        summary: Anonymous callers see the public show projection.
      - auth_modes:
          - session
          - service_token
        sections:
          - shared_metadata
          - public_payload
        summary: Authenticated callers currently receive the same public show projection here and use shows.workspace for private detail.
  - name: shows.workspace
    summary: Private by-id show workspace consumed by the admin UI and authenticated agents.
    path: /v1/projections/0007-Flowershow/shows/{id}/workspace
    object_kinds:
      - show
      - entry
      - show_class
      - person
    auth_modes:
      - session
      - service_token
    capabilities:
      - state_transitions
      - activity_events
      - sessions
      - uploads
    freshness: materialized
    data_views:
      - auth_modes:
          - session
          - service_token
        sections:
          - shared_metadata
          - public_payload
          - private_payload
          - runtime_only
        summary: Authenticated callers get the full admin workspace including private detail and runtime helpers.
  - name: shows.people_lookup
    summary: Private show-scoped member and guest lookup used for entrant assignment and intake.
    path: /v1/projections/0007-Flowershow/shows/{id}/people.lookup
    object_kinds:
      - person
      - organization
    auth_modes:
      - session
      - service_token
    capabilities:
      - state_transitions
      - sessions
    freshness: direct
    data_views:
      - auth_modes:
          - session
          - service_token
        sections:
          - shared_metadata
          - private_payload
          - runtime_only
        summary: Authenticated operators and agents can search host-organization members and guests for fast entrant assignment.
  - name: shows.board
    summary: Private full-show board projection with class-grouped entries and workflow status cues.
    path: /v1/projections/0007-Flowershow/shows/{id}/board
    object_kinds:
      - show
      - show_class
      - entry
      - person
    auth_modes:
      - session
      - service_token
    capabilities:
      - activity_events
      - sessions
    freshness: direct
    data_views:
      - auth_modes:
          - session
          - service_token
        sections:
          - shared_metadata
          - private_payload
          - runtime_only
        summary: Authenticated operators and agents can inspect the full show board, including class-grouped entries, photo gaps, and live floor workflow status.
  - name: entries.list
    summary: Entries for a show or class.
    path: /v1/projections/0007-Flowershow/entries
    object_kinds:
      - entry
    auth_modes:
      - anonymous
      - session
      - service_token
    capabilities:
      - state_transitions
      - activity_events
    freshness: materialized
    data_views:
      - auth_modes:
          - anonymous
          - session
          - service_token
        sections:
          - shared_metadata
          - public_payload
        summary: List views expose public entry slices only.
  - name: entries.detail
    summary: Stable by-id entry detail projection.
    path: /v1/projections/0007-Flowershow/entries/{id}
    object_kinds:
      - entry
      - person
    auth_modes:
      - anonymous
      - session
      - service_token
    capabilities:
      - state_transitions
      - activity_events
      - uploads
    freshness: materialized
    data_views:
      - auth_modes:
          - anonymous
        sections:
          - shared_metadata
          - public_payload
        summary: Anonymous callers get public entry detail and masked person identity.
      - auth_modes:
          - session
          - service_token
        sections:
          - shared_metadata
          - public_payload
          - private_payload
        summary: Authenticated callers also get private entry and person data.
  - name: classes.list
    summary: Classes within a schedule.
    path: /v1/projections/0007-Flowershow/classes
    object_kinds:
      - show_class
    auth_modes:
      - anonymous
      - session
      - service_token
    capabilities:
      - activity_events
    freshness: materialized
    data_views:
      - auth_modes:
          - anonymous
          - session
          - service_token
        sections:
          - shared_metadata
          - public_payload
        summary: All callers get the public class slice for list views.
  - name: classes.detail
    summary: Stable by-id class detail projection with rules and citation context.
    path: /v1/projections/0007-Flowershow/classes/{id}
    object_kinds:
      - show_class
      - show
    auth_modes:
      - anonymous
      - session
      - service_token
    capabilities:
      - activity_events
    freshness: materialized
    data_views:
      - auth_modes:
          - anonymous
          - session
          - service_token
        sections:
          - shared_metadata
          - public_payload
        summary: Class detail is public; authenticated agents still benefit from stable by-id access and richer surrounding context.
  - name: taxonomy.browse
    summary: Taxon listing and cross-references.
    path: /v1/projections/0007-Flowershow/taxonomy
    object_kinds:
      - taxon
    auth_modes:
      - anonymous
      - session
      - service_token
    capabilities:
      - search_documents
    freshness: materialized
  - name: leaderboard
    summary: Season leaderboard per organization.
    path: /v1/projections/0007-Flowershow/leaderboard
    object_kinds:
      - entry
      - person
    auth_modes:
      - anonymous
      - session
      - service_token
    capabilities:
      - activity_events
    freshness: materialized
  - name: shows.ledger
    summary: Append-only claim history for a show's objects.
    path: /v1/projections/0007-Flowershow/ledger/{objectID}
    object_kinds:
      - show
    auth_modes:
      - session
      - service_token
    capabilities:
      - activity_events
    freshness: materialized
    data_views:
      - auth_modes:
          - session
          - service_token
        sections:
          - shared_metadata
          - private_payload
        summary: Ledger views are private operational projections.
  - name: admin.dashboard
    summary: Cross-show admin overview with counts and role visibility.
    path: /v1/projections/0007-Flowershow/admin/dashboard
    object_kinds:
      - show
      - person
    auth_modes:
      - session
      - service_token
    capabilities:
      - activity_events
      - sessions
    freshness: materialized
    data_views:
      - auth_modes:
          - session
          - service_token
        sections:
          - shared_metadata
          - private_payload
          - runtime_only
        summary: Admin dashboard is a private operational projection.
ui_surfaces:
  - name: public_show_page
    summary: Public show detail page.
    path: /shows/{slug}
    auth_modes:
      - anonymous
    uses_projections:
      - shows.detail
      - entries.list
      - classes.list
  - name: public_class_page
    summary: Public class detail page.
    path: /shows/{slug}/classes/{classID}
    auth_modes:
      - anonymous
    uses_projections:
      - classes.detail
      - entries.list
  - name: admin_show_workspace
    summary: Private HTMX show admin screen used for schedule, entry, rule, scoring, and citation management.
    path: /admin/shows/{showID}
    auth_modes:
      - session
      - service_token
    uses_projections:
      - shows.workspace
      - entries.detail
      - classes.detail
    mutates_commands:
      - shows.update
      - schedules.upsert
      - judges.assign
      - divisions.create
      - sections.create
      - classes.create
      - entries.create
      - entries.set_placement
      - entries.set_visibility
      - media.attach
      - media.delete
      - rubrics.create
      - criteria.create
      - scorecards.submit
      - classes.compute_placements
      - standards.create
      - editions.create
      - sources.create
      - citations.create
      - rules.create
      - overrides.create
  - name: admin_role_management
    summary: Private role management screen for show and organization scopes.
    path: /admin/roles
    auth_modes:
      - session
      - service_token
    uses_projections:
      - admin.dashboard
    mutates_commands:
      - roles.assign
  - name: admin_club_workspace
    summary: Private club admin screen for invite creation and organization-scoped access management.
    path: /admin/clubs/{organizationID}
    auth_modes:
      - session
      - service_token
    uses_projections:
      - clubs.workspace
    mutates_commands:
      - clubs.invites.create
consistency:
  write_visibility: read_your_writes
  projection_freshness: materialized
