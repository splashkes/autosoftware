contract_version: v1
surface_kind: interactive
seed_id: 0007-Flowershow
realization_id: a-firstbloom
summary: First-bloom realization with agent-equal flower-show authoring, standards-backed schedule governance, rubric scoring, taxonomy, and live admin workspaces.
links:
  seed_design: ../../design.md
  seed_brief: ../../brief.md
  seed_acceptance: ../../acceptance.md
  realization_readme: README.md
  kernel_agent_principles: ../../../../kernel/protocol/v1/AUTOSOFTWARE_AGENT_PRINCIPLES.md
  seed_agent_principles: ../../AUTOSOFTWARE_AGENT_PRINCIPLES.md
auth_modes:
  - anonymous
  - session
  - service_token
capabilities:
  - name: state_transitions
    summary: Lifecycle state changes for shows, entries, and awards.
  - name: activity_events
    summary: Auditable record of mutations across all domain objects.
  - name: sessions
    summary: Authenticated admin and service sessions.
  - name: search_documents
    summary: Searchable projections for shows, entries, taxonomy.
  - name: uploads
    summary: Media file uploads for entry photos and videos.
domain_objects:
  - kind: show
    summary: A single flower show competition event hosted by an organization.
    schema_ref: ../../design.md#2-show
    capabilities:
      - state_transitions
      - activity_events
    data_layout:
      shared_metadata:
        summary: Stable show identity and routing fields shared across clients.
        fields:
          - name: id
            type: string
            summary: Stable show id.
          - name: slug
            type: string
            summary: Public handle used by browser routes.
          - name: organization_id
            type: string
            summary: Stable hosting organization id.
          - name: status
            type: string
            summary: Lifecycle status for the show.
      public_payload:
        summary: Publicly shareable show content.
        fields:
          - name: name
            type: string
            summary: Public show name.
          - name: location
            type: string
            summary: Public venue or location label.
          - name: date
            type: string
            summary: Public event date string.
          - name: season
            type: string
            summary: Season grouping for the show.
  - kind: entry
    summary: A submission into a class within a show, linked to a person.
    schema_ref: ../../design.md#8-entries
    capabilities:
      - state_transitions
      - activity_events
      - uploads
    data_layout:
      shared_metadata:
        summary: Stable entry identity and related object ids.
        fields:
          - name: id
            type: string
            summary: Stable entry id.
          - name: show_id
            type: string
            summary: Stable parent show id.
          - name: class_id
            type: string
            summary: Stable parent class id.
      public_payload:
        summary: Publicly visible entry information.
        fields:
          - name: name
            type: string
            summary: Entry display title.
          - name: placement
            type: integer
            summary: Public competition placement when available.
          - name: points
            type: number
            summary: Public points tally when available.
          - name: taxon_refs
            type: array<string>
            summary: Referenced taxonomy ids for the entry.
      private_payload:
        summary: Authenticated-only entry details.
        fields:
          - name: person_id
            type: string
            summary: Stable entrant person id.
          - name: suppressed
            type: boolean
            summary: Whether the entry is hidden from public views.
          - name: notes
            type: string
            summary: Private or operator-facing notes.
  - kind: show_schedule
    summary: A schedule governing divisions and classes for a show.
    schema_ref: ../../design.md
    capabilities:
      - activity_events
  - kind: division
    summary: A major grouping within a show schedule (e.g., Horticulture, Design).
    schema_ref: ../../design.md
    capabilities:
      - activity_events
  - kind: section
    summary: A section within a division containing classes.
    schema_ref: ../../design.md
    capabilities:
      - activity_events
  - kind: show_class
    summary: A class within a section of a division in a show schedule.
    schema_ref: ../../design.md#3-show-schedule--class-hierarchy
    capabilities:
      - activity_events
    data_layout:
      shared_metadata:
        summary: Stable class addressing fields.
        fields:
          - name: id
            type: string
            summary: Stable class id.
          - name: section_id
            type: string
            summary: Stable parent section id.
          - name: class_number
            type: string
            summary: Human schedule number for the class.
          - name: sort_order
            type: integer
            summary: Explicit operator-managed ordering within the section.
          - name: domain
            type: string
            summary: Domain such as horticulture or design.
      public_payload:
        summary: Public class wording and constraints.
        fields:
          - name: title
            type: string
            summary: Public class title.
          - name: description
            type: string
            summary: Public class description.
          - name: specimen_count
            type: integer
            summary: Number of specimens or stems required when applicable.
          - name: schedule_notes
            type: string
            summary: Public schedule note text for the class.
  - kind: person
    summary: An entrant, judge, or member with private identity.
    schema_ref: ../../design.md#7-people
    capabilities:
      - activity_events
    data_layout:
      shared_metadata:
        summary: Stable person identity safe to traverse publicly.
        fields:
          - name: id
            type: string
            summary: Stable person id.
          - name: initials
            type: string
            summary: Public initials used in anonymous views.
      private_payload:
        summary: Authenticated-only identity fields.
        fields:
          - name: first_name
            type: string
            summary: Private first name.
          - name: last_name
            type: string
            summary: Private last name.
          - name: email
            type: string
            summary: Private email address when present.
  - kind: organization
    summary: A hosting club or society associated with shows and people.
    schema_ref: ../../design.md#1-organizations
    capabilities:
      - activity_events
    data_layout:
      shared_metadata:
        summary: Stable organization identity safe to traverse.
        fields:
          - name: id
            type: string
            summary: Stable organization id.
      public_payload:
        summary: Public organization naming fields.
        fields:
          - name: name
            type: string
            summary: Public organization name.
          - name: level
            type: string
            summary: Organization level such as club, district, or society.
  - kind: show_credit
    summary: A free-form show page credit, separate from permissions.
    schema_ref: ../../design.md#7-people
    capabilities:
      - activity_events
    data_layout:
      shared_metadata:
        summary: Stable credit identity and show linkage.
        fields:
          - name: id
            type: string
            summary: Stable show credit id.
          - name: show_id
            type: string
            summary: Stable parent show id.
      public_payload:
        summary: Publicly visible show credit wording.
        fields:
          - name: credit_label
            type: string
            summary: Display label such as host, scribe, or designer.
          - name: display_name
            type: string
            summary: Free-text display name when the credit is not linked to a stored person.
          - name: sort_order
            type: integer
            summary: Ordering of credits on the show page.
  - kind: taxon
    summary: A concept in the taxonomy graph (botanical, design, etc).
    schema_ref: ../../design.md#10-domains
    capabilities:
      - search_documents
  - kind: award_definition
    summary: An award defined per organization and season with scoring rules.
    schema_ref: ../../design.md#9-judging--rubric-scoring
    capabilities:
      - state_transitions
      - activity_events
commands:
  - name: organization.create
    summary: Create a new organization record that can later host shows and memberships.
    path: /v1/commands/0007-Flowershow/organization.create
    object_kinds:
      - organization
    auth_modes:
      - session
      - service_token
    idempotency: recommended
    input_schema_ref: ../../design.md#1-organizations
    result_schema_ref: README.md#realization
    capabilities:
      - state_transitions
      - activity_events
    projection: organizations.directory
    consistency: read_your_writes
    error_codes:
      - code: invalid_json
        summary: Request body did not match the declared JSON schema.
      - code: organization_create_failed
        summary: Organization creation failed validation or referenced invalid parent objects.
      - code: unauthorized
        summary: Caller did not satisfy the required auth mode for this command.
  - name: shows.create
    summary: Create a new flower show. Accepts flat JSON command fields, or an input/runtime_context envelope when an agent wants to include runtime-only authoring guidance.
    path: /v1/commands/0007-Flowershow/shows.create
    object_kinds:
      - show
    auth_modes:
      - session
      - service_token
    idempotency: recommended
    input_schema_ref: ../../design.md#11-interface-and-agent-access
    result_schema_ref: README.md#realization
    capabilities:
      - state_transitions
      - activity_events
    projection: shows.detail
    consistency: read_your_writes
    runtime_context:
      summary: Optional runtime-only guidance carried by remote agents when composing a show authoring request.
      fields:
        - name: assistant_goal
          type: string
          summary: Brief note about the outcome the operator wants the agent to achieve.
        - name: source_excerpt
          type: string
          summary: Human-supplied excerpt used only to guide request composition.
    error_codes:
      - code: invalid_json
        summary: Request body did not match the declared JSON schema.
      - code: show_create_failed
        summary: Show creation failed validation or referenced invalid objects.
      - code: unauthorized
        summary: Caller did not satisfy the required auth mode for this command.
  - name: shows.update
    summary: Update show details.
    path: /v1/commands/0007-Flowershow/shows.update
    object_kinds:
      - show
    auth_modes:
      - session
      - service_token
    idempotency: required
    input_schema_ref: ../../design.md#11-interface-and-agent-access
    result_schema_ref: README.md#realization
    capabilities:
      - activity_events
    projection: shows.detail
    consistency: read_your_writes
  - name: shows.reset_schedule
    summary: Clear a show's schedule hierarchy and related entries so an import can restart cleanly on the same show.
    path: /v1/commands/0007-Flowershow/shows.reset_schedule
    object_kinds:
      - show
      - show_class
      - entry
    auth_modes:
      - session
      - service_token
    idempotency: recommended
    input_schema_ref: ../../design.md#11-interface-and-agent-access
    result_schema_ref: README.md#realization
    capabilities:
      - state_transitions
      - activity_events
    projection: shows.workspace
    consistency: read_your_writes
    error_codes:
      - code: invalid_json
        summary: Request body did not match the declared JSON schema.
      - code: show_reset_schedule_failed
        summary: Reset failed because the show id was invalid or the existing hierarchy could not be cleared.
      - code: unauthorized
        summary: Caller did not satisfy the required auth mode for this command.
  - name: schedules.upsert
    summary: Create or update the schedule governance record for a show.
    path: /v1/commands/0007-Flowershow/schedules.upsert
    object_kinds:
      - show
    auth_modes:
      - session
      - service_token
    idempotency: required
    input_schema_ref: ../../design.md#3-show-schedule--class-hierarchy
    result_schema_ref: README.md#realization
    capabilities:
      - activity_events
    projection: shows.workspace
    consistency: read_your_writes
    runtime_context:
      summary: Optional interpretation guidance for schedule and standards linkage.
      fields:
        - name: governing_standard_rule
          type: string
          summary: Runtime-only note describing how to prefer one cited standard over another.
    error_codes:
      - code: schedule_show_required
        summary: The schedule upsert request did not include a stable show id.
      - code: schedule_upsert_failed
        summary: Schedule governance could not be created or updated.
  - name: judges.assign
    summary: Assign a judge to a show.
    path: /v1/commands/0007-Flowershow/judges.assign
    object_kinds:
      - show
      - person
    auth_modes:
      - session
      - service_token
    idempotency: recommended
