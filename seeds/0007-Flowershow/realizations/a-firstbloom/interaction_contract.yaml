    result_schema_ref: README.md#realization
    capabilities:
      - uploads
      - activity_events
    projection: entries.detail
    consistency: read_your_writes
    error_codes:
      - code: invalid_multipart
        summary: Request body was not valid multipart/form-data.
      - code: media_entry_missing
        summary: The path did not reference a stable existing entry id.
      - code: media_upload_failed
        summary: The binary file could not be stored or validated.
      - code: media_attach_failed
        summary: Stored file metadata could not be attached to the entry.
      - code: unauthorized
        summary: Caller did not satisfy the required auth mode for this command.
