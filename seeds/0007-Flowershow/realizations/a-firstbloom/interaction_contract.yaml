      summary: Optional runtime-only extraction or interpretation notes for the cited source.
      fields:
        - name: interpretation_note
          type: string
          summary: Temporary note about how the caller interpreted the cited schedule text.
    error_codes:
      - code: citation_create_failed
        summary: Citation creation failed validation or referenced invalid objects.
  - name: ingestions.import
