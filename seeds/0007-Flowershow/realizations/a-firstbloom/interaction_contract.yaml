projections:
  - name: shows.directory
    description: List of all shows with summary info.
    auth: anonymous
  - name: shows.detail
    description: Single show with schedule, entries, awards.
    auth: anonymous
  - name: shows.record
    description: Full show record including admin-level detail.
    auth: session
  - name: shows.ledger
    description: Append-only claim history for a show's objects.
    auth: session
  - name: entries.list
    description: Entries for a show or class.
    auth: anonymous
  - name: entries.detail
    description: Single entry with scores, media, taxonomy.
    auth: anonymous
  - name: classes.list
    description: Classes within a schedule, division, or section.
    auth: anonymous
  - name: taxonomy.browse
    description: Taxon listing and cross-references.
    auth: anonymous
  - name: leaderboard
    description: Season leaderboard per organization.
    auth: anonymous
  - name: admin.dashboard
    description: Show admin overview with counts and status.
    auth: session

auth_modes:
  - anonymous
  - session
  - service_token

domain_objects:
  - organization
  - show
  - show_schedule
  - division
  - section
  - show_class
  - person
  - entry
  - media
