  - name: citations.create
    summary: Create a source citation for a target record. Accepts flat JSON command fields, or an input/runtime_context envelope when an agent wants to include runtime-only interpretation notes.
    path: /v1/commands/0007-Flowershow/citations.create
    object_kinds:
      - show_class
    auth_modes:
      - session
      - service_token
