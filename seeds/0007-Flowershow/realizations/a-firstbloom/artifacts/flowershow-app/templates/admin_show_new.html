{{define "content"}}
<div class="breadcrumb">
  <a href="{{$.BasePath}}/admin">Admin</a> &rsaquo; <span>New Show</span>
</div>

<h1>Create Show</h1>
<form method="POST" action="{{$.BasePath}}/admin/shows" class="form">
  <div class="form-group">
    <label for="name">Show Name</label>
    <input type="text" id="name" name="name" class="form-input" required>
  </div>
  <div class="form-group">
    <label for="organization_id">Organization</label>
    <select id="organization_id" name="organization_id" class="form-input">
      {{range .Orgs}}<option value="{{.ID}}">{{.Name}}</option>{{end}}
    </select>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label for="location">Location</label>
      <input type="text" id="location" name="location" class="form-input">
    </div>
    <div class="form-group">
      <label for="date">Date</label>
      <input type="date" id="date" name="date" class="form-input">
    </div>
    <div class="form-group">
      <label for="season">Season</label>
      <input type="text" id="season" name="season" class="form-input" value="{{.DefaultSeason}}">
    </div>
  </div>
  <button type="submit" class="btn btn-primary">Create Show</button>
</form>
{{end}}
