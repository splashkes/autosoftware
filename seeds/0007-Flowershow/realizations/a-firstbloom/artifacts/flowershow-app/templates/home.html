{{define "content"}}
<div class="hero">
  <h1>Flowershow</h1>
  <p class="hero-sub">Discover flower shows, browse entries, and celebrate horticultural excellence.</p>
</div>

<section class="section">
  <h2>Shows</h2>
  {{if .Shows}}
  <div class="card-grid">
    {{range .Shows}}
    <a href="/shows/{{.Slug}}" class="card show-card">
      <div class="card-body">
        <h3 class="card-title">{{.Name}}</h3>
        <p class="card-meta">{{.Location}} &middot; {{.Date}}</p>
        <p class="card-meta">Season {{.Season}} {{statusBadge .Status}}</p>
      </div>
    </a>
    {{end}}
  </div>
  {{else}}
  <p class="empty-state">No shows yet. <a href="/admin">Create one</a>.</p>
  {{end}}
</section>
{{end}}
