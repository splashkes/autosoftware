{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Title}} — Flowershow</title>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
<link rel="stylesheet" href="{{bp}}/assets/app.css?v={{assetVersion}}">
</head>
<body>
<nav class="nav">
  <div class="container nav-inner">
    <div class="nav-primary">
      <a href="{{bp}}/" class="nav-brand">Flowershow</a>
      <div class="nav-links">
        <a href="{{bp}}/" class="nav-link">Shows</a>
        <a href="{{bp}}/clubs" class="nav-link">Clubs</a>
        <a href="{{bp}}/classes" class="nav-link">Classes</a>
        <a href="{{bp}}/browse" class="nav-link">Browse</a>
      </div>
    </div>
    <div class="nav-user-links">
      {{if .NavSignedIn}}
      <a href="{{bp}}{{.NavUserHref}}" class="nav-link nav-user-link">{{.NavUserLabel}}</a>
      {{if .NavShowAdmin}}<a href="{{bp}}/admin" class="nav-link nav-admin">Admin</a>{{end}}
      {{else}}
      <a href="{{bp}}/admin/login" class="nav-link nav-user-link">Log in</a>
      {{end}}
    </div>
  </div>
</nav>
<main class="main">
  <div class="container">
    {{template "content" .}}
  </div>
</main>
<footer class="footer">
  <div class="container">
    <p>Flowershow — Seed 0007</p>
  </div>
</footer>
{{template "agent_access_widget" .}}
<script src="{{bp}}/assets/app.js?v={{assetVersion}}"></script>
</body>
</html>
{{end}}
