{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Title}} — Flowershow</title>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
<link rel="stylesheet" href="{{$.BasePath}}/assets/app.css?v={{assetVersion}}">
</head>
<body>
<nav class="nav" data-nav-shell>
  <div class="container nav-shell">
    <div class="nav-topline">
      <a href="{{$.BasePath}}/" class="nav-brand">Flowershow</a>
      <button type="button" class="nav-toggle" aria-expanded="false" aria-controls="flowershow-nav-menu" data-nav-toggle>
        <span class="nav-toggle-lines" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </span>
        <span class="sr-only">Open navigation</span>
      </button>
    </div>
    <div class="nav-menu" id="flowershow-nav-menu" data-nav-menu>
      <div class="nav-links">
        <a href="{{$.BasePath}}/" class="nav-link">Shows</a>
        <a href="{{$.BasePath}}/clubs" class="nav-link">Clubs</a>
        <a href="{{$.BasePath}}/classes" class="nav-link">Classes</a>
        <a href="{{$.BasePath}}/browse" class="nav-link">Browse</a>
      </div>
      <div class="nav-user-links">
        {{if .NavSignedIn}}
        <a href="{{$.BasePath}}{{.NavUserHref}}" class="nav-link nav-user-link">{{.NavUserLabel}}</a>
        {{if .NavShowAdmin}}<a href="{{$.BasePath}}/admin" class="nav-link nav-admin">Admin</a>{{end}}
        {{else}}
        <a href="{{$.BasePath}}/admin/login" class="nav-link nav-user-link">Log in</a>
        {{end}}
      </div>
    </div>
  </div>
</nav>
<main class="main">
  <div class="container">
    {{template "content" .}}
  </div>
</main>
<footer class="footer">
  <div class="container">
    <p>Flowershow — Seed 0007</p>
  </div>
</footer>
{{template "agent_access_widget" .}}
<script src="{{$.BasePath}}/assets/app.js?v={{assetVersion}}"></script>
</body>
</html>
{{end}}
