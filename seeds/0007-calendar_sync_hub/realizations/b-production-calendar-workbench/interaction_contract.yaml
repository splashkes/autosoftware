contract_version: v1
surface_kind: interactive
seed_id: 0007-calendar_sync_hub
realization_id: b-production-calendar-workbench
summary: Workbench-first contract for reviewing normalized events, curating production truth, and controlling downstream publication.
links:
  seed_design: ../../design.md
  seed_brief: ../../brief.md
  seed_acceptance: ../../acceptance.md
  realization_readme: README.md
auth_modes:
  - session
  - service_token
capabilities:
  - name: review_intake_queue
    summary: Review inbound normalized events before they become production truth.
  - name: curate_production_calendar
    summary: Organize approved production events in timeline and calendar views.
  - name: inspect_event_lineage
    summary: Trace production events back to source lineage and forward to destinations.
  - name: manage_destination_publication
    summary: Configure and retry destination publication for production events.
  - name: inspect_conflicts
    summary: Find schedule overlaps, upstream drift, and publication failures that need attention.
domain_objects:
  - kind: calendar_source
    summary: Upstream calendar or feed connected for ingestion.
    schema_ref: ../../SCHEMA.md
    capabilities:
      - review_intake_queue
      - inspect_event_lineage
  - kind: normalized_event
    summary: Hub-owned normalized event awaiting review or already linked to production truth.
    schema_ref: ../../SCHEMA.md
    capabilities:
      - review_intake_queue
      - inspect_event_lineage
      - inspect_conflicts
  - kind: production_event
    summary: Approved event record shown in the central production calendar.
    schema_ref: ../../design.md
    capabilities:
      - curate_production_calendar
      - inspect_event_lineage
      - manage_destination_publication
      - inspect_conflicts
  - kind: calendar_destination
    summary: Downstream calendar or feed used for publication from the production calendar.
    schema_ref: ../../SCHEMA.md
    capabilities:
      - manage_destination_publication
      - inspect_event_lineage
  - kind: propagation_edge
    summary: Publication state for a production event on one destination calendar.
    schema_ref: ../../SCHEMA.md
    capabilities:
      - manage_destination_publication
      - inspect_event_lineage
      - inspect_conflicts
commands:
  - name: calendar_sources.register
    summary: Register or update an upstream calendar source for ingestion.
    path: /v1/commands/0007-calendar_sync_hub/calendar_sources.register
    object_kinds:
      - calendar_source
    auth_modes:
      - session
      - service_token
    idempotency: required
    input_schema_ref: ../../design.md
    result_schema_ref: README.md
    capabilities:
      - review_intake_queue
    projection: intake.queue
    consistency: read_your_writes
  - name: normalized_events.promote_to_production
    summary: Approve a normalized event as production truth and place it on the production calendar.
    path: /v1/commands/0007-calendar_sync_hub/normalized_events.promote_to_production
    object_kinds:
      - normalized_event
      - production_event
    auth_modes:
      - session
      - service_token
    idempotency: required
    input_schema_ref: ../../design.md
    result_schema_ref: README.md
    capabilities:
      - review_intake_queue
      - curate_production_calendar
      - inspect_event_lineage
    projection: production.calendar
    consistency: read_your_writes
  - name: production_events.configure_publication
    summary: Configure destination publication for a production event.
    path: /v1/commands/0007-calendar_sync_hub/production_events.configure_publication
    object_kinds:
      - production_event
      - propagation_edge
      - calendar_destination
    auth_modes:
      - session
      - service_token
    idempotency: required
    input_schema_ref: ../../PROPAGATION.md
    result_schema_ref: README.md
    capabilities:
      - manage_destination_publication
      - inspect_event_lineage
    projection: production.event_detail
    consistency: read_your_writes
  - name: propagation_edges.retry
    summary: Retry a failed publication edge for a production event.
    path: /v1/commands/0007-calendar_sync_hub/propagation_edges.retry
    object_kinds:
      - propagation_edge
      - production_event
    auth_modes:
      - session
      - service_token
    idempotency: best_effort
    input_schema_ref: ../../PROPAGATION.md
    result_schema_ref: README.md
    capabilities:
      - manage_destination_publication
      - inspect_conflicts
    projection: publication.status
    consistency: eventual
projections:
  - name: workbench.home
    summary: Workbench landing surface showing intake volume, production schedule, and destination health at a glance.
    path: /v1/projections/0007-calendar_sync_hub/workbench
    object_kinds:
      - normalized_event
      - production_event
      - propagation_edge
    capabilities:
      - review_intake_queue
      - curate_production_calendar
      - inspect_conflicts
    freshness: materialized
  - name: intake.queue
    summary: Review queue for normalized inbound events that need approval, merge, or deferral.
    path: /v1/projections/0007-calendar_sync_hub/intake
    object_kinds:
      - normalized_event
      - calendar_source
    capabilities:
      - review_intake_queue
      - inspect_event_lineage
      - inspect_conflicts
    freshness: materialized
  - name: production.calendar
    summary: Timeline and calendar projection of approved production events.
    path: /v1/projections/0007-calendar_sync_hub/production-calendar
    object_kinds:
      - production_event
    capabilities:
      - curate_production_calendar
      - inspect_conflicts
    freshness: materialized
  - name: production.event_detail
    summary: Production-event detail showing source lineage, review history, and destination publication state.
    path: /v1/projections/0007-calendar_sync_hub/production-events/{event_id}
    object_kinds:
      - normalized_event
      - production_event
      - propagation_edge
      - calendar_destination
    capabilities:
      - curate_production_calendar
      - inspect_event_lineage
      - manage_destination_publication
    freshness: materialized
  - name: publication.status
    summary: Publication board grouped by destination state for production events.
    path: /v1/projections/0007-calendar_sync_hub/publication
    object_kinds:
      - production_event
      - propagation_edge
      - calendar_destination
    capabilities:
      - manage_destination_publication
      - inspect_conflicts
      - inspect_event_lineage
    freshness: materialized
consistency:
  write_visibility: eventual
  projection_freshness: materialized
