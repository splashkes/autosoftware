contract_version: v1
surface_kind: interactive
seed_id: 0004-event-listings
realization_id: a-web-mvp
summary: First web MVP operational contract for organizer publishing, stable event identity, and public plus private event discovery.
links:
  seed_design: ../../design.md
  seed_brief: ../../brief.md
  seed_acceptance: ../../acceptance.md
  realization_readme: README.md
auth_modes:
  - anonymous
  - session
  - service_token
capabilities:
  - name: activity_events
    summary: Auditable event lifecycle activity for organizer actions.
  - name: handles
    summary: Stable public addressing so event URLs do not change when details are edited.
  - name: publications
    summary: Public visibility and timing for event discovery surfaces.
  - name: search_documents
    summary: Searchable event read models for list and detail discovery.
  - name: search_facets
    summary: Filterable category, date, and location dimensions for event discovery.
  - name: state_transitions
    summary: Auditable draft, published, canceled, and archived lifecycle changes.
domain_objects:
  - kind: event
    summary: Organizer-managed event with a stable identity, stable public handle, and separate public plus private read surfaces.
    schema_ref: ../../design.md
    capabilities:
      - activity_events
      - handles
      - publications
      - search_documents
      - search_facets
      - state_transitions
commands:
  - name: events.create
    summary: Create an event draft in the organizer workspace.
    path: /v1/commands/0004-event-listings/events.create
    object_kinds:
      - event
    auth_modes:
      - session
      - service_token
    idempotency: required
    input_schema_ref: ../../design.md
    result_schema_ref: README.md
    capabilities:
      - activity_events
      - handles
      - state_transitions
    projection: events.record
    consistency: read_your_writes
  - name: events.update
    summary: Edit an existing event without changing its stable public handle or object identity.
    path: /v1/commands/0004-event-listings/events.update
    object_kinds:
      - event
    auth_modes:
      - session
      - service_token
    idempotency: required
    input_schema_ref: ../../design.md
    result_schema_ref: README.md
    capabilities:
      - activity_events
      - handles
      - state_transitions
    projection: events.record
    consistency: read_your_writes
  - name: events.publish
    summary: Publish an event into public list, calendar, and search surfaces.
    path: /v1/commands/0004-event-listings/events.publish
    object_kinds:
      - event
    auth_modes:
      - session
      - service_token
    idempotency: required
    input_schema_ref: ../../design.md
    result_schema_ref: README.md
    capabilities:
      - activity_events
      - publications
      - search_documents
      - search_facets
      - state_transitions
    projection: events.record
    consistency: read_your_writes
  - name: events.unpublish
    summary: Return an event to draft while preserving its stable public handle.
    path: /v1/commands/0004-event-listings/events.unpublish
    object_kinds:
      - event
    auth_modes:
      - session
      - service_token
    idempotency: required
    input_schema_ref: ../../design.md
    result_schema_ref: README.md
    capabilities:
      - activity_events
      - publications
      - state_transitions
    projection: events.record
    consistency: read_your_writes
  - name: events.cancel
    summary: Mark an event canceled while keeping the public detail route stable and understandable.
    path: /v1/commands/0004-event-listings/events.cancel
    object_kinds:
      - event
    auth_modes:
      - session
      - service_token
    idempotency: required
    input_schema_ref: ../../design.md
    result_schema_ref: README.md
    capabilities:
      - activity_events
      - publications
      - state_transitions
    projection: events.record
    consistency: read_your_writes
  - name: events.archive
    summary: Archive an event while retaining object identity and direct-link detail access.
    path: /v1/commands/0004-event-listings/events.archive
    object_kinds:
      - event
    auth_modes:
      - session
      - service_token
    idempotency: required
    input_schema_ref: ../../design.md
    result_schema_ref: README.md
    capabilities:
      - activity_events
      - publications
      - state_transitions
    projection: events.record
    consistency: read_your_writes
projections:
  - name: events.detail
    summary: Canonical public event detail projection keyed by stable handle; public states are anonymous while draft reads require organizer auth.
    path: /v1/projections/0004-event-listings/events/{slug}
    object_kinds:
      - event
    auth_modes:
      - anonymous
      - session
      - service_token
    capabilities:
      - activity_events
      - handles
      - publications
      - search_documents
      - state_transitions
    freshness: materialized
  - name: events.directory
    summary: Public upcoming-events list projection with shared search and filter semantics.
    path: /v1/projections/0004-event-listings/events
    object_kinds:
      - event
    auth_modes:
      - anonymous
      - session
      - service_token
    capabilities:
      - publications
      - search_documents
      - search_facets
      - state_transitions
    freshness: materialized
  - name: events.calendar
    summary: Month-calendar projection covering single-day and simple multi-day event rendering.
    path: /v1/projections/0004-event-listings/calendar
    object_kinds:
      - event
    auth_modes:
      - anonymous
      - session
      - service_token
    capabilities:
      - publications
      - search_facets
      - state_transitions
    freshness: materialized
  - name: events.record
    summary: Stable by-ID event projection for alternate clients; public states are anonymous while draft reads require organizer auth.
    path: /v1/projections/0004-event-listings/events/by-id/{event_id}
    object_kinds:
      - event
    auth_modes:
      - anonymous
      - session
      - service_token
    capabilities:
      - activity_events
      - handles
      - publications
      - search_documents
      - state_transitions
    freshness: materialized
  - name: events.workspace
    summary: Organizer workspace projection listing draft and public events through the same contract surfaced to alternate clients.
    path: /v1/projections/0004-event-listings/admin/events
    object_kinds:
      - event
    auth_modes:
      - session
      - service_token
    capabilities:
      - activity_events
      - handles
      - publications
      - search_documents
      - search_facets
      - state_transitions
    freshness: materialized
consistency:
  write_visibility: read_your_writes
  projection_freshness: materialized
