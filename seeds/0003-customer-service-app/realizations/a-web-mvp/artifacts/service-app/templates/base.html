{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Title}} — Support</title>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5;color:#1a1a1a;line-height:1.5}
a{color:#2563eb;text-decoration:none}
a:hover{text-decoration:underline}
.container{max-width:1000px;margin:0 auto;padding:0 1rem}
.nav{background:#fff;border-bottom:1px solid #e5e5e5;padding:.75rem 0}
.nav .container{display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap}
.nav-brand{font-weight:700;font-size:1.1rem;color:#1a1a1a}
.nav-links{display:flex;gap:1rem;align-items:center}
.nav-links a{color:#555;font-size:.9rem}
.nav-links a:hover{color:#2563eb}
.nav-right{margin-left:auto;display:flex;gap:.75rem;align-items:center;font-size:.85rem}
.main{padding:1.5rem 0 3rem}
h1{font-size:1.5rem;margin-bottom:1rem}
h2{font-size:1.25rem;margin-bottom:.75rem}
h3{font-size:1.1rem;margin-bottom:.5rem}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:8px;padding:1.25rem;margin-bottom:1rem}
.card h3{margin-bottom:.5rem}
.btn{display:inline-block;padding:.5rem 1rem;border-radius:6px;border:1px solid #d1d5db;background:#fff;color:#374151;cursor:pointer;font-size:.875rem;font-family:inherit;text-align:center}
.btn:hover{background:#f9fafb;text-decoration:none}
.btn-primary{background:#2563eb;color:#fff;border-color:#2563eb}
.btn-primary:hover{background:#1d4ed8}
.btn-danger{background:#dc2626;color:#fff;border-color:#dc2626}
.btn-danger:hover{background:#b91c1c}
.btn-success{background:#16a34a;color:#fff;border-color:#16a34a}
.btn-success:hover{background:#15803d}
.btn-sm{padding:.25rem .625rem;font-size:.8rem}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-weight:600;margin-bottom:.25rem;font-size:.875rem}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:.5rem .75rem;border:1px solid #d1d5db;border-radius:6px;font-size:.875rem;font-family:inherit}
.form-group textarea{min-height:100px;resize:vertical}
.form-row{display:flex;gap:1rem}
.form-row .form-group{flex:1}
.badge{display:inline-block;padding:.125rem .5rem;border-radius:999px;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.02em}
.badge-blue{background:#dbeafe;color:#1e40af}
.badge-green{background:#dcfce7;color:#166534}
.badge-yellow{background:#fef9c3;color:#854d0e}
.badge-purple{background:#f3e8ff;color:#6b21a8}
.badge-gray{background:#f3f4f6;color:#374151}
.badge-orange{background:#ffedd5;color:#9a3412}
.badge-red{background:#fee2e2;color:#991b1b}
.alert{padding:.75rem 1rem;border-radius:6px;margin-bottom:1rem;font-size:.875rem}
.alert-error{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
.alert-success{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
.alert-info{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}
table{width:100%;border-collapse:collapse}
th,td{padding:.5rem .75rem;text-align:left;border-bottom:1px solid #e5e5e5;font-size:.875rem}
th{background:#f9fafb;font-weight:600;color:#6b7280}
tr:hover{background:#f9fafb}
.filters{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.filters select,.filters input{padding:.375rem .5rem;border:1px solid #d1d5db;border-radius:6px;font-size:.8rem}
.text-muted{color:#6b7280;font-size:.85rem}
.text-sm{font-size:.85rem}
.mt-1{margin-top:.5rem}
.mt-2{margin-top:1rem}
.mb-1{margin-bottom:.5rem}
.mb-2{margin-bottom:1rem}
.flex{display:flex}
.gap-1{gap:.5rem}
.gap-2{gap:1rem}
.items-center{align-items:center}
.justify-between{display:flex;justify-content:space-between;align-items:center}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:640px){.grid-2{grid-template-columns:1fr}.form-row{flex-direction:column}}
.message{padding:.75rem 1rem;border-radius:8px;margin-bottom:.5rem}
.message-customer{background:#eff6ff;border:1px solid #bfdbfe}
.message-agent{background:#f0fdf4;border:1px solid #bbf7d0}
.message-system{background:#f3f4f6;border:1px solid #e5e5e5;font-style:italic;font-size:.85rem}
.message-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.25rem}
.message-author{font-weight:600;font-size:.85rem}
.message-time{color:#9ca3af;font-size:.75rem}
.note{background:#fffbeb;border:1px solid #fde68a;padding:.75rem 1rem;border-radius:8px;margin-bottom:.5rem}
.note-header{display:flex;justify-content:space-between;margin-bottom:.25rem;font-size:.85rem}
.chat-msg{padding:.5rem .75rem;margin-bottom:.375rem;border-radius:8px;font-size:.9rem}
.chat-msg-customer{background:#eff6ff;border:1px solid #bfdbfe}
.chat-msg-agent{background:#f0fdf4;border:1px solid #bbf7d0}
.chat-msg-system{background:#f3f4f6;border:1px solid #e5e5e5;font-style:italic;font-size:.8rem}
.chat-msg strong{font-size:.8rem}
.chat-time{color:#9ca3af;font-size:.7rem;margin-left:.5rem}
.chat-msg p{margin-top:.125rem}
.chat-container{display:flex;flex-direction:column;height:60vh}
.chat-messages{flex:1;overflow-y:auto;padding:1rem;border:1px solid #e5e5e5;border-radius:8px;margin-bottom:.75rem;background:#fff}
.chat-input{display:flex;gap:.5rem}
.chat-input input{flex:1;padding:.5rem .75rem;border:1px solid #d1d5db;border-radius:6px;font-size:.875rem}
.sidebar{display:flex;gap:1.5rem}
.sidebar-main{flex:1;min-width:0}
.sidebar-aside{width:280px;flex-shrink:0}
@media(max-width:768px){.sidebar{flex-direction:column}.sidebar-aside{width:100%}}
.kb-article h2,.kb-article h3{margin-top:1rem}
.kb-article p{margin:.5rem 0}
.kb-article ul,.kb-article ol{margin:.5rem 0;padding-left:1.5rem}
.kb-article li{margin:.25rem 0}
.search-box{position:relative;margin-bottom:1rem}
.search-box input{width:100%;padding:.625rem 1rem;border:1px solid #d1d5db;border-radius:8px;font-size:.9rem}
.hero{text-align:center;padding:2rem 0;margin-bottom:1.5rem}
.hero h1{font-size:1.75rem;margin-bottom:.5rem}
.hero p{color:#6b7280}
.action-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem}
@media(max-width:640px){.action-cards{grid-template-columns:1fr}}
.action-card{background:#fff;border:1px solid #e5e5e5;border-radius:8px;padding:1.25rem;text-align:center;transition:box-shadow .15s}
.action-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);text-decoration:none}
.action-card h3{margin-bottom:.25rem;color:#1a1a1a}
.action-card p{font-size:.85rem;color:#6b7280}
</style>
</head>
<body>
<nav class="nav">
<div class="container">
<a href="/" class="nav-brand">Support Center</a>
<div class="nav-links">
<a href="/">Home</a>
<a href="/help/articles">Knowledge Base</a>
<a href="/help/tickets/new">Submit Request</a>
<a href="/chat">Live Chat</a>
</div>
<div class="nav-right">
{{if .Agent}}
<span>{{.Agent.Name}}</span>
<a href="/agent/inbox">Inbox</a>
<a href="/agent/chats">Chats</a>
<a href="/agent/articles">KB Admin</a>
<form method="post" action="/agent/logout" style="display:inline"><button class="btn btn-sm" type="submit">Logout</button></form>
{{else}}
<a href="/help/tickets/lookup">Find Ticket</a>
<a href="/agent/login" class="text-muted">Agent Login</a>
{{end}}
</div>
</div>
</nav>
<main class="main">
<div class="container">
{{template "content" .}}
</div>
</main>
</body>
</html>
{{end}}
