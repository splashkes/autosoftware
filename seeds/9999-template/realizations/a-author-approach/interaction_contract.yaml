contract_version: v1
surface_kind: interactive
seed_id: 9999-template
realization_id: a-author-approach
summary: Template operational contract showing how a realized seed exposes the same commands and projections to the UI and machine clients.
links:
  seed_design: ../../design.md
  seed_brief: ../../brief.md
  seed_acceptance: ../../acceptance.md
  realization_readme: README.md
  kernel_agent_principles: ../../../../kernel/protocol/v1/AUTOSOFTWARE_AGENT_PRINCIPLES.md
  seed_agent_principles: ../../AUTOSOFTWARE_AGENT_PRINCIPLES.md
auth_modes:
  - anonymous
  - session
  - service_token
capabilities:
  - name: handles
    summary: Stable human-readable addressing for the example item.
  - name: publications
    summary: Publication windows and visibility for the example item.
  - name: principals
    summary: Stable actor identities for edit provenance and ownership.
  - name: state_transitions
    summary: Auditable lifecycle changes for the example item.
  - name: activity_events
    summary: User-visible activity history tied to important commands.
  - name: search_documents
    summary: Searchable read models for the example item.
domain_objects:
  - kind: example_item
    summary: Placeholder domain object representing the thing this seed changes.
    schema_ref: ../../design.md#data-and-claim-changes
    capabilities:
      - handles
      - publications
      - state_transitions
      - activity_events
      - search_documents
    data_layout:
      shared_metadata:
        summary: The minimum stable data another client needs to identify and traverse the object.
        fields:
          - name: item_id
            type: string
            summary: Stable object identity for alternate clients.
          - name: slug
            type: string
            summary: Stable public handle when the UX uses a readable route.
          - name: status
            type: string
            summary: Lifecycle state exposed to public and private clients.
      public_payload:
        summary: Content intentionally visible to anonymous or broadly shared clients.
        fields:
          - name: title
            type: string
            summary: Public display title.
          - name: summary
            type: string
            summary: Public summary copy.
      private_payload:
        summary: Content visible only to non-anonymous clients.
        fields:
          - name: draft_notes
            type: string
            summary: Organizer-only or operator-only notes.
      runtime_only:
        summary: Realization helpers that are not accepted registry data.
        fields:
          - name: display_label
            type: string
            summary: Derived label generated by the current runtime.
  - kind: example_item_version
    summary: Immutable version of the example item so changes are transparent and attributable.
    schema_ref: ../../design.md#versions-and-provenance
    capabilities:
      - publications
      - state_transitions
      - activity_events
      - principals
    data_layout:
      shared_metadata:
        summary: Stable version identity and provenance.
        fields:
          - name: version_id
            type: string
            summary: Stable immutable version identity.
          - name: item_id
            type: string
            summary: Parent object identity.
          - name: created_by_actor_id
            type: string
            summary: Actor that created this version.
          - name: created_at
            type: RFC3339 timestamp
            summary: Time this version was created.
      public_payload:
        summary: Accepted public snapshot for the example item.
        fields:
          - name: title
            type: string
            summary: Public title for this version.
          - name: summary
            type: string
            summary: Public summary copy for this version.
      private_payload:
        summary: Private or draft-only version content.
        fields:
          - name: draft_notes
            type: string
            summary: Organizer-only or operator-only notes for this version.
  - kind: actor
    summary: Actor identity that created or edited example item versions.
    schema_ref: ../../design.md#canonical-graph
    capabilities:
      - principals
      - activity_events
domain_relations:
  - kind: example_item_current_version
    summary: Points an example item at the current version used by projections.
    from_kinds:
      - example_item
    to_kinds:
      - example_item_version
    cardinality: one_to_one
    visibility: mixed
    schema_ref: ../../design.md#versions-and-provenance
    capabilities:
      - publications
      - state_transitions
      - activity_events
  - kind: version_created_by
    summary: Links an example item version to the actor that created it.
    from_kinds:
      - example_item_version
    to_kinds:
      - actor
    cardinality: many_to_one
    visibility: mixed
    schema_ref: ../../design.md#versions-and-provenance
    capabilities:
      - principals
      - activity_events
    attributes:
      - name: change_summary
        type: string
        summary: Brief description of what changed in this version.
commands:
  - name: example_items.create
    summary: Create an example item through the same normalized command used by the UI and machine clients.
    path: /v1/commands/9999-template/example_items.create
    object_kinds:
      - example_item
    auth_modes:
      - session
      - service_token
    idempotency: required
    input_schema_ref: ../../design.md#interface-changes
    result_schema_ref: README.md#realization-template
    capabilities:
      - handles
      - state_transitions
      - activity_events
    projection: example_items.detail
    consistency: read_your_writes
    runtime_context:
      summary: Optional runtime-only context that can help an agent author the request without becoming canonical object truth.
      fields:
        - name: assistant_goal
          type: string
          summary: Brief instruction about what the caller is trying to achieve with this write.
        - name: source_excerpt
          type: string
          summary: Operator-supplied excerpt or citation text used only to guide the request composition.
    error_codes:
      - code: invalid_json
        summary: Request body did not match the declared JSON schema.
      - code: validation_failed
        summary: One or more required fields were missing or invalid.
      - code: unauthorized
        summary: Caller did not satisfy the required auth mode for this command.
  - name: example_items.publish
    summary: Publish an example item for public reads after validating its lifecycle state.
    path: /v1/commands/9999-template/example_items.publish
    object_kinds:
      - example_item
    auth_modes:
      - session
      - service_token
    idempotency: required
    input_schema_ref: ../../design.md#interface-changes
    result_schema_ref: README.md#realization-template
    capabilities:
      - publications
      - state_transitions
      - activity_events
    projection: example_items.detail
    consistency: read_your_writes
    error_codes:
      - code: invalid_state
        summary: The item cannot be published from its current lifecycle state.
      - code: unauthorized
        summary: Caller did not satisfy the required auth mode for this command.
projections:
  - name: example_items.detail
    summary: Canonical detail view consumed by both the first-party UI and third-party clients.
    path: /v1/projections/9999-template/example-items/{item_id}
    object_kinds:
      - example_item
    auth_modes:
      - anonymous
      - session
      - service_token
    capabilities:
      - handles
      - publications
      - state_transitions
      - activity_events
      - search_documents
    freshness: materialized
    data_views:
      - auth_modes:
          - anonymous
        sections:
          - shared_metadata
          - public_payload
        summary: Anonymous clients get shared metadata and the public payload.
      - auth_modes:
          - session
          - service_token
        sections:
          - shared_metadata
          - public_payload
          - private_payload
          - runtime_only
        summary: Authenticated or service clients get the fuller contract plus runtime helpers.
  - name: example_items.search
    summary: Search projection for listing example items by the shared operational API.
    path: /v1/projections/9999-template/example-items
    object_kinds:
      - example_item
    auth_modes:
      - anonymous
      - session
      - service_token
    capabilities:
      - publications
      - search_documents
    freshness: materialized
    data_views:
      - auth_modes:
          - anonymous
          - session
          - service_token
        sections:
          - shared_metadata
          - public_payload
        summary: Search results expose the reusable public slice only.
ui_surfaces:
  - name: example_item_public_page
    summary: Public page showing the accepted example item state.
    path: /example-items/{item_id}
    auth_modes:
      - anonymous
    uses_projections:
      - example_items.detail
  - name: example_item_author_workspace
    summary: Private authoring screen for creating and publishing example items.
    path: /author/example-items/{item_id}
    auth_modes:
      - session
      - service_token
    uses_projections:
      - example_items.detail
      - example_items.search
    mutates_commands:
      - example_items.create
      - example_items.publish
consistency:
  write_visibility: read_your_writes
  projection_freshness: materialized
