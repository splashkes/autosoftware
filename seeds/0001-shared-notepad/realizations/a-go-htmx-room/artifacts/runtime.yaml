kind: runtime
version: 1
runtime: go
entrypoint: artifacts/notepad-app/main.go
working_directory: artifacts/notepad-app
run:
  command: go
  args:
    - run
    - .
environment:
  AS_SEEDS_DIR: ""
notes:
  - AS_ADDR is injected by the kernel execution backend at launch time.
  - Set AS_SEEDS_DIR to the repo seeds/ directory to enable seed creation from the sprout modal.
  - The kernel execution backend can launch this realization locally from the runtime manifest.
