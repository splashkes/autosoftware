contract_version: v1
surface_kind: interactive
seed_id: 0001-shared-notepad
realization_id: a-go-htmx-room
summary: Draft operational contract for the shared notepad room and its note mutation surface.
links:
  seed_design: ../../design.md
  seed_brief: ../../brief.md
  seed_acceptance: ../../acceptance.md
  realization_readme: README.md
auth_modes:
  - anonymous
  - service_token
capabilities:
  - name: activity_events
    summary: Shared note mutations are observable as a common event stream for UI and machine clients.
domain_objects:
  - kind: shared_note
    summary: Mutable note in the single shared room.
    schema_ref: ../../design.md
    capabilities:
      - activity_events
commands:
  - name: notes.create
    summary: Create a note in the shared room through the same normalized command used by the UI and machine clients.
    path: /v1/commands/0001-shared-notepad/notes.create
    object_kinds:
      - shared_note
    auth_modes:
      - anonymous
      - service_token
    idempotency: recommended
    input_schema_ref: ../../design.md
    result_schema_ref: README.md
    capabilities:
      - activity_events
    projection: notes.room
    consistency: read_your_writes
  - name: notes.update
    summary: Update an existing note in the shared room.
    path: /v1/commands/0001-shared-notepad/notes.update
    object_kinds:
      - shared_note
    auth_modes:
      - anonymous
      - service_token
    idempotency: required
    input_schema_ref: ../../design.md
    result_schema_ref: README.md
    capabilities:
      - activity_events
    projection: notes.room
    consistency: read_your_writes
  - name: notes.delete
    summary: Remove a note from the shared room.
    path: /v1/commands/0001-shared-notepad/notes.delete
    object_kinds:
      - shared_note
    auth_modes:
      - anonymous
      - service_token
    idempotency: required
    input_schema_ref: ../../design.md
    result_schema_ref: README.md
    capabilities:
      - activity_events
    projection: notes.room
    consistency: read_your_writes
projections:
  - name: notes.room
    summary: Shared-room notes projection consumed by both the first-party interface and machine clients.
    path: /v1/projections/0001-shared-notepad/notes
    object_kinds:
      - shared_note
    capabilities:
      - activity_events
    freshness: direct
consistency:
  write_visibility: read_your_writes
  projection_freshness: direct
